version: '3.9'
services:
  db:
    image: postgis/postgis:15-3.3
    restart: always
    environment:
      POSTGRES_DB: ethioloadai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ../backend
    env_file:
      - ../.env.example
    depends_on:
      - db
    ports:
      - '8001:8000'
    volumes:
      - ../backend:/var/www/html
    command: php artisan serve --host=0.0.0.0 --port=8000

  ai_engine:
    build: ../ai_engine
    env_file:
      - ../.env.example
    depends_on:
      - db
    ports:
      - '8000:8000'
    volumes:
      - ../ai_engine:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000

volumes:
  pgdata:
