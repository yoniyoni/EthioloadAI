name: ethioload_ai
description: "EthioLoad AI – AI-powered freight logistics for Ethiopia"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod: ^2.4.0

  # Networking
  dio: ^5.3.0

  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # Location / GPS
  geolocator: ^10.1.0

  # Map rendering (OpenStreetMap tiles, no API key needed)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Localization
  easy_localization: ^3.0.7

  # UI
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0

  # Logging
  logger: ^2.0.0

  # Image picking for document uploads
  image_picker: ^1.0.7

  # Date/time formatting — pinned to match flutter_localizations SDK constraint
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/languages/
